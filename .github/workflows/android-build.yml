name: NightGram Android Build

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightgram-android-build
  cancel-in-progress: true

jobs:
  android:
    name: Build Android Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      NIGHTGRAM_MOBILE_URL: https://night-gram.vercel.app
      NIGHTGRAM_MOBILE_ALLOW_NAVIGATION: night-gram.vercel.app
      NIGHTGRAM_ANDROID_APP_ID: app.nightgram.mobile
      NIGHTGRAM_IOS_BUNDLE_ID: app.nightgram.mobile

      NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
      NPM_CONFIG_AUDIT: "false"
      NPM_CONFIG_FUND: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Verify environment
        run: |
          node --version
          npm --version
          java -version
          echo "Mobile URL: $NIGHTGRAM_MOBILE_URL"

      - name: Install dependencies
        run: npm ci

      - name: Configure native project
        run: node scripts/configure-native.mjs

      - name: Synchronize Capacitor Android
        run: npx cap sync android

      - name: Verify generated Capacitor files
        run: |
          test -f android/capacitor-cordova-android-plugins/cordova.variables.gradle
          test -f android/app/capacitor.build.gradle
          echo "Capacitor Android files generated successfully"

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Verify APK
        run: |
          test -f android/app/build/outputs/apk/debug/app-debug.apk
          ls -lh android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: NightGram-Android-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
