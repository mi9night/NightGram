name: NightGram Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: TypeScript and Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Configure npm registry
        run: npm config set registry https://registry.npmjs.org/

      - name: Verify npm registry
        run: npm config get registry

      - name: Clear npm cache
        run: npm cache clean --force

      - name: Install dependencies
        run: npm ci --registry=https://registry.npmjs.org/ --fetch-retries=10 --fetch-retry-factor=2 --fetch-retry-mintimeout=20000 --fetch-retry-maxtimeout=120000

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Backend dependency check
        working-directory: backend
        run: npm ci --registry=https://registry.npmjs.org/ --fetch-retries=10 --fetch-retry-factor=2 --fetch-retry-mintimeout=20000 --fetch-retry-maxtimeout=120000
