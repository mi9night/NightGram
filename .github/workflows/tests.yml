name: NightGram Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightgram-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: TypeScript and Dependency Check
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
      NPM_CONFIG_AUDIT: "false"
      NPM_CONFIG_FUND: "false"
      NPM_CONFIG_FETCH_RETRIES: "5"
      NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: "10000"
      NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: "120000"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Verify Node.js version
        run: |
          node --version
          npm --version

      - name: Reject internal registry URLs
        shell: bash
        run: |
          if grep -R "applied-caas-gateway" package-lock.json backend/package-lock.json; then
            echo "Ошибка: package-lock.json содержит внутренний npm registry."
            exit 1
          fi

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: TypeScript check
        run: npm run type-check

      - name: Native project checks
        run: npm run test:native
