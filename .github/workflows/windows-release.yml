name: Windows Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.4"

      - name: Verify tag and package version
        shell: pwsh
        run: |
          $tagVersion = "${{ github.ref_name }}".TrimStart('v')
          $packageVersion = node -p "require('./package.json').version"
          if ($tagVersion -ne $packageVersion) {
            throw "Tag v$tagVersion does not match package.json version $packageVersion"
          }

      - name: Install dependencies
        run: npm install --include=optional --no-audit --no-fund

      - name: Desktop integration tests
        run: npm run test:desktop

      - name: Global search integration checks
        run: npm run test:search

      - name: Channel moderation checks
        run: npm run test:channel-moderation

      - name: TypeScript
        run: npm run type-check

      - name: ESLint
        run: npm run lint

      - name: Build Windows installer
        run: npm run dist:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Verify packaged standalone runtime
        shell: pwsh
        run: |
          $runtime = "release/win-unpacked/resources/app"
          $required = @(
            "$runtime/server.js",
            "$runtime/node_modules/next/package.json",
            "$runtime/node_modules/react/package.json",
            "$runtime/node_modules/react-dom/package.json"
          )
          foreach ($file in $required) {
            if (-not (Test-Path $file)) { throw "Incomplete NightGram runtime: missing $file" }
          }

      - name: Create SHA-256 checksum
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          $installer = Get-Item "release/NightGram-Setup-$version-x64.exe"
          $hash = (Get-FileHash -Algorithm SHA256 $installer.FullName).Hash.ToLowerInvariant()
          Set-Content -Path "$($installer.FullName).sha256" -Value "$hash *$($installer.Name)" -Encoding ascii -NoNewline
          Write-Host "SHA-256: $hash"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            release/NightGram-Setup-*.exe
            release/NightGram-Setup-*.exe.sha256
